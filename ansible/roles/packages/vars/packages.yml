custom_installer_packages:
  - name: Jackett
    github_repo: Jackett/Jackett
    asset_pattern: "Jackett\\.Installer\\.Windows\\.exe$"
    install_type: installer
    install_args: "/VERYSILENT /NORESTART"
    profile_tags: [home]
    fallback_url: https://github.com/Jackett/Jackett/releases/latest

  - name: Soulseek QT
    fallback_url: https://www.slsknet.org/SoulseekQt/Windows/SoulseekQt-2019-7-22.exe
    install_type: installer
    install_args: "/S"
    profile_tags: [home]

  - name: Neural Amp Modeler
    github_repo: sdatkinson/NeuralAmpModelerPlugin
    asset_pattern: "Neural_Amp_Modeler-.*\\.exe$"
    install_type: installer
    install_args: "/VERYSILENT"
    profile_tags: [home]
    fallback_url: https://github.com/sdatkinson/NeuralAmpModelerPlugin/releases/latest

  - name: LiveCaptions Translator
    github_repo: SakiRinn/LiveCaptions-Translator
    asset_pattern: "LiveCaptions-Translator.*\\.zip$"
    install_type: portable
    extract_to: "%PROGRAMFILES%\\LiveCaptions-Translator"
    profile_tags: [home]
    fallback_url: https://github.com/SakiRinn/LiveCaptions-Translator/releases/latest

  - name: rkill
    fallback_url: https://download.bleepingcomputer.com/grinler/rkill.exe
    install_type: portable
    extract_to: "%USERPROFILE%\\Tools"
    profile_tags: [work, home]

  - name: FreeTube
    github_repo: FreeTubeApp/FreeTube
    asset_pattern: "freetube-.*-win-x64-portable\\.zip$"
    install_type: portable
    extract_to: "%PROGRAMFILES%\\FreeTube"
    profile_tags: [home]
    fallback_url: https://github.com/FreeTubeApp/FreeTube/releases/latest

  - name: Parsec
    fallback_url: https://builds.parsec.app/package/parsec-windows.exe
    install_type: installer
    install_args: "/silent"
    profile_tags: [home]

uv_tools:
  - ruff
  - flake8
